name: ISACalculator
options:
  bundleIdPrefix: com.lielmachluf
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: true
    SWIFT_EMIT_LOC_STRINGS: true

targets:
  ISACalculator:
    type: application
    platform: iOS
    sources:
      - ISACalculator
    settings:
      base:
        PRODUCT_NAME: AeroAtmos
        PRODUCT_BUNDLE_IDENTIFIER: com.lielmachluf.aeroatmos-isa
        INFOPLIST_FILE: ISACalculator/Info.plist
        DEVELOPMENT_ASSET_PATHS: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: BUC6ASR452
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
    entitlements:
      path: ISACalculator/ISACalculator.entitlements
    info:
      path: ISACalculator/Info.plist
      properties:
        CFBundleDisplayName: AeroAtmos
        UILaunchScreen: {}
        NSMotionUsageDescription: "Used to read barometric pressure from the device sensor for live atmosphere data."
        NSLocationWhenInUseUsageDescription: "Used to obtain your GPS altitude for atmosphere calculations."
        CFBundleLocalizations:
          - en
          - he
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies: []

  ISACalculatorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ISACalculatorTests
    dependencies:
      - target: ISACalculator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lielmachluf.ISACalculatorTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AeroAtmos.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AeroAtmos"
        BUNDLE_LOADER: "$(TEST_HOST)"

  ISACalculatorUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ISACalculatorUITests
    dependencies:
      - target: ISACalculator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lielmachluf.ISACalculatorUITests

schemes:
  ISACalculator:
    build:
      targets:
        ISACalculator: all
        ISACalculatorTests: [test]
        ISACalculatorUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ISACalculatorTests
        - ISACalculatorUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
